services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: educen_api
    ports:
      - "5062:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__MyDatabase=Server=host.docker.internal,1433;Database=EducenV2;User Id=sa;Password=123;TrustServerCertificate=True;
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure
