services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: educen_api
    ports:
      - "5106:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__AdminConnection=Server=host.docker.internal,1433;Database=EducenAdmin;User Id=sa;Password=123;TrustServerCertificate=True;
      - ConnectionStrings__DefaultTenantConnection=Server=host.docker.internal,1433;Database=EducenV2;User Id=sa;Password=123;TrustServerCertificate=True;
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure
